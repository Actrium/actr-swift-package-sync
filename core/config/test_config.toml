edition = 1

exports = ["examples/test.proto"]

[package]
name = "test-service"
description = "Test configuration"

[package.actr_type]
manufacturer = "acme"
name = "test-service"

[dependencies]
user-service = {}
payment = { actr_type = "acme+payment-service", fingerprint = "service_semantic:abc123..." }

[scripts]
run = "cargo run"
test = "cargo test"

[system.signaling]
url = "ws://localhost:8081"

[system.deployment]
realm_id = 1001

[system.discovery]
visible = true

[system.observability]
filter_level = "info"
tracing_enabled = false
tracing_endpoint = "http://localhost:4317"
tracing_service_name = "test-service"
