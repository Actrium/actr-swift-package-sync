version: 2
updates:
  # Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    reviewers:
      - "actor-rtc/maintainers"
    assignees:
      - "actor-rtc/maintainers"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "all"
    ignore:
      # 忽略主要版本更新 (需要手动审查)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    reviewers:
      - "actor-rtc/maintainers"
    assignees:
      - "actor-rtc/maintainers"
    commit-message:
      prefix: "ci"
      include: "scope"