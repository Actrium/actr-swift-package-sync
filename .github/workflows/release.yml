name: Swift Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in X.Y.Z format.
        required: true
        type: string
      source_sha:
        description: Source commit from the actr monorepo.
        required: true
        type: string
      source_tag:
        description: Source tag from the actr monorepo.
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
      - name: Validate package-sync repository
        run: |
          test -f Package.swift
          test -f .github/workflows/release.yml
      - name: Checkout source repository
        env:
          SOURCE_REPOSITORY: https://github.com/Actrium/actr
        run: |
          rm -rf source-checkout
          git clone --depth 1 --branch "${{ inputs.source_tag }}" "${SOURCE_REPOSITORY}" source-checkout
          actual_sha=$(git -C source-checkout rev-parse HEAD)
          test "${actual_sha}" = "${{ inputs.source_sha }}"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - name: Install UniFFI bindgen
        run: cargo install --locked uniffi --version 0.30.0 --features cli --bin uniffi-bindgen
      - name: Install native dependencies
        run: brew install opus
      - name: Build XCFramework
        working-directory: source-checkout/bindings/swift
        env:
          ACTR_BUILD_PROFILE: release
          ACTR_BINDINGS_PATH: dist/ActrBindings
          ACTR_BINARY_PATH: dist/ActrFFI.xcframework
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: ./build-xcframework.sh
      - name: Build Swift package
        env:
          ACTR_BINDINGS_PATH: dist/ActrBindings
          ACTR_BINARY_PATH: dist/ActrFFI.xcframework
        run: swift build --package-path source-checkout/bindings/swift
      - name: Package XCFramework
        working-directory: source-checkout/bindings/swift
        env:
          ACTR_BINARY_PATH: dist/ActrFFI.xcframework
        run: ./scripts/package-binary.sh "v${{ inputs.version }}"
      - name: Sync Swift package files
        run: |
          mkdir -p Sources
          rsync -a --delete source-checkout/bindings/swift/Sources/ Sources/
          rsync -a --delete source-checkout/bindings/swift/dist/ActrBindings/ ActrBindings/
      - name: Build distribution package
        env:
          ACTR_BINDINGS_PATH: ActrBindings
          ACTR_BINARY_PATH: source-checkout/bindings/swift/dist/ActrFFI.xcframework
        run: swift build
      - name: Update Package.swift defaults
        run: |
          checksum=$(python3 - <<'PY'
          from pathlib import Path
          text = Path("source-checkout/bindings/swift/dist/release.txt").read_text()
          for line in text.splitlines():
              if line.startswith("SHA256 checksum:"):
                  print(line.split(":", 1)[1].strip())
                  break
          else:
              raise SystemExit("checksum not found in release.txt")
          PY
          )
          python3 - "${{ inputs.version }}" "${checksum}" <<'PY'
          from pathlib import Path
          import re
          import sys

          version = sys.argv[1]
          checksum = sys.argv[2]
          path = Path("Package.swift")
          text = path.read_text()
          text = re.sub(r'let releaseTag = env\["ACTR_BINARY_TAG"\] \?\? "v[^"]+"', f'let releaseTag = env["ACTR_BINARY_TAG"] ?? "v{version}"', text)
          text = re.sub(r'let remoteBinaryChecksum = env\["ACTR_BINARY_CHECKSUM"\] \?\? [^\n]+', f'let remoteBinaryChecksum = env["ACTR_BINARY_CHECKSUM"] ?? "{checksum}"', text)
          path.write_text(text)
          PY
      - name: Write release metadata
        run: |
          python3 - "${{ inputs.version }}" "${{ inputs.source_tag }}" "${{ inputs.source_sha }}" <<'PY'
          from __future__ import annotations

          import json
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          payload = {
              "version": sys.argv[1],
              "source_repository": "https://github.com/Actrium/actr",
              "source_tag": sys.argv[2],
              "source_sha": sys.argv[3],
              "generated_at": datetime.now(timezone.utc).isoformat(),
          }
          Path("release-metadata.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY
      - name: Commit release metadata
        run: |
          git config user.name "Harry"
          git config user.email "128583280+kaito-harry@users.noreply.github.com"
          git add Package.swift Sources ActrBindings release-metadata.json
          git commit -m "chore(release): publish v${{ inputs.version }}" || exit 0
          git push origin main
      - name: Tag release
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat <<EOF > release-notes.md
          Source repository: https://github.com/Actrium/actr
          Source tag: ${{ inputs.source_tag }}
          Source sha: ${{ inputs.source_sha }}
          EOF
          gh release create "v${{ inputs.version }}" \
            "source-checkout/bindings/swift/dist/ActrFFI.xcframework.zip" \
            --title "v${{ inputs.version }}" \
            --notes-file release-notes.md
