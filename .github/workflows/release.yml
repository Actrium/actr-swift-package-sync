name: Swift Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in X.Y.Z format.
        required: true
        type: string
      source_sha:
        description: Source commit from the actr monorepo.
        required: true
        type: string
      source_tag:
        description: Source tag from the actr monorepo.
        required: true
        type: string
      target_branch:
        description: Package-sync branch to update.
        required: false
        type: string
        default: main
      dry_run:
        description: Build and validate without committing, tagging, or creating a release.
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-xcframework:
    uses: ./.github/workflows/build-xcframework.yml
    with:
      source_ref: ${{ inputs.source_tag }}
      source_sha: ${{ inputs.source_sha }}
      build_profile: release

  release:
    needs: build-xcframework
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_branch }}
      - name: Validate package-sync repository
        run: |
          test -f Package.swift
          test -f .github/workflows/release.yml
      - name: Validate inputs
        env:
          VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "error: invalid version format '${VERSION}'" >&2; exit 1; }
          echo "${SOURCE_SHA}" | grep -Eq '^[a-f0-9]{40}$' || { echo "error: invalid source_sha format" >&2; exit 1; }
          test "${SOURCE_TAG}" = "v${VERSION}" || { echo "error: source_tag '${SOURCE_TAG}' must equal v${VERSION}" >&2; exit 1; }

          if [[ "${TARGET_BRANCH}" != "main" && ! "${TARGET_BRANCH}" =~ ^release-([0-9]+)\.([0-9]+)$ ]]; then
            echo "error: target_branch must be main or release-X.Y" >&2
            exit 1
          fi
          if [[ "${TARGET_BRANCH}" =~ ^release-([0-9]+)\.([0-9]+)$ ]]; then
            release_line="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            [[ "${VERSION}" == "${release_line}."* ]] || {
              echo "error: version ${VERSION} does not belong to ${TARGET_BRANCH}" >&2
              exit 1
            }
          fi

          git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" >/dev/null || {
            echo "error: target branch ${TARGET_BRANCH} does not exist" >&2
            exit 1
          }
          if [[ "${DRY_RUN}" != "true" ]] && git rev-parse --verify --quiet "refs/tags/v${VERSION}" >/dev/null; then
            echo "error: tag v${VERSION} already exists" >&2
            exit 1
          fi
      - name: Checkout source repository
        uses: ./.github/actions/checkout-source
        id: checkout
        with:
          source_ref: ${{ inputs.source_tag }}
          source_sha: ${{ inputs.source_sha }}
          source_repository: https://github.com/Actrium/actr
      - name: Download assembled distribution
        uses: actions/download-artifact@v4
        with:
          name: actr-swift-dist
          path: source-checkout/bindings/swift/dist
      - name: Package XCFramework
        working-directory: source-checkout/bindings/swift
        env:
          ACTR_BINARY_PATH: dist/ActrFFI.xcframework
          VERSION: ${{ inputs.version }}
        run: ./scripts/package-binary.sh "v${VERSION}"
      - name: Sync Swift package files
        run: |
          mkdir -p Sources
          rsync -a --delete source-checkout/bindings/swift/Sources/ Sources/
          rsync -a --delete source-checkout/bindings/swift/dist/ActrBindings/ ActrBindings/
      - name: Build distribution package
        env:
          ACTR_BINDINGS_PATH: ActrBindings
          ACTR_BINARY_PATH: source-checkout/bindings/swift/dist/ActrFFI.xcframework
        run: swift build
      - name: Update Package.swift defaults
        env:
          VERSION: ${{ inputs.version }}
        run: |
          checksum=$(python3 - <<'PY'
          from pathlib import Path
          text = Path("source-checkout/bindings/swift/dist/release.txt").read_text()
          for line in text.splitlines():
              if line.startswith("SHA256 checksum:"):
                  print(line.split(":", 1)[1].strip())
                  break
          else:
              raise SystemExit("checksum not found in release.txt")
          PY
          )
          python3 - "${checksum}" <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          version = os.environ["VERSION"]
          checksum = sys.argv[1]
          path = Path("Package.swift")
          text = path.read_text()
          old_tag = re.search(r'let releaseTag = env\["ACTR_BINARY_TAG"\] \?\? "v[^"]+"', text)
          old_checksum = re.search(r'let remoteBinaryChecksum = env\["ACTR_BINARY_CHECKSUM"\] \?\? [^\n]+', text)
          if not old_tag or not old_checksum:
              raise SystemExit("error: could not find releaseTag or remoteBinaryChecksum in Package.swift")
          text = text.replace(old_tag.group(0), f'let releaseTag = env["ACTR_BINARY_TAG"] ?? "v{version}"')
          text = text.replace(old_checksum.group(0), f'let remoteBinaryChecksum = env["ACTR_BINARY_CHECKSUM"] ?? "{checksum}"')
          path.write_text(text)
          PY
      - name: Write release metadata
        env:
          VERSION: ${{ inputs.version }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          payload = {
              "version": os.environ["VERSION"],
              "source_repository": "https://github.com/Actrium/actr",
              "source_tag": os.environ["SOURCE_TAG"],
              "source_sha": os.environ["SOURCE_SHA"],
              "target_branch": os.environ["TARGET_BRANCH"],
              "generated_at": datetime.now(timezone.utc).isoformat(),
          }
          Path("release-metadata.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY
      - name: Commit release metadata
        if: ${{ inputs.dry_run == false }}
        env:
          VERSION: ${{ inputs.version }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Package.swift Sources ActrBindings release-metadata.json
          git commit -m "chore(release): publish v${VERSION}" || exit 0
          git push origin "HEAD:${TARGET_BRANCH}"
      - name: Tag release
        if: ${{ inputs.dry_run == false }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/v${VERSION}" >/dev/null; then
            echo "error: tag v${VERSION} already exists" >&2
            exit 1
          fi
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
      - name: Create GitHub Release
        if: ${{ inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          cat <<EOF > release-notes.md
          Source repository: https://github.com/Actrium/actr
          Source tag: ${SOURCE_TAG}
          Source sha: ${SOURCE_SHA}
          Package-sync branch: ${TARGET_BRANCH}
          EOF
          args=(
            "v${VERSION}"
            "source-checkout/bindings/swift/dist/ActrFFI.xcframework.zip"
            --title "v${VERSION}"
            --notes-file release-notes.md
            --verify-tag
          )
          [[ "${TARGET_BRANCH}" == release-* ]] && args+=(--latest=false)
          gh release create "${args[@]}"
